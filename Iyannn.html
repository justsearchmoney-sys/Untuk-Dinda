<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Untuk Dinda 🩵</title>

<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Quicksand:wght@400;700&display=swap" rel="stylesheet">


<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}


body{

height:100vh;

overflow:hidden;

font-family:'Quicksand',sans-serif;

background:linear-gradient(
180deg,
#5eb7ff,
#9ddcff,
#d7f3ff
);

display:flex;

justify-content:center;

align-items:center;

}



/* LANGIT */

.sky{

position:fixed;

width:100%;

height:100%;

overflow:hidden;

}



/* AWAN */

.cloud{

position:absolute;

font-size:80px;

opacity:.8;

animation:cloudMove linear infinite;

}


.cloud:nth-child(1){

top:10%;

left:-200px;

animation-duration:35s;

}


.cloud:nth-child(2){

top:35%;

left:-300px;

animation-duration:50s;

}


.cloud:nth-child(3){

top:70%;

left:-250px;

animation-duration:40s;

}



@keyframes cloudMove{

from{

transform:translateX(0);

}

to{

transform:translateX(1500px);

}

}




/* BINTANG */

.star{

position:absolute;

background:white;

border-radius:50%;

animation:twinkle 2s infinite;

}



@keyframes twinkle{

0%{

opacity:.3;

transform:scale(.8);

}


50%{

opacity:1;

transform:scale(1.3);

}


100%{

opacity:.3;

transform:scale(.8);

}

}





/* KUCING */

.cat{

position:absolute;

font-size:55px;

animation:catMove 3s infinite ease-in-out;

}



.cat1{

bottom:20px;

left:20px;

}


.cat2{

top:40px;

right:25px;

animation-delay:1s;

}



@keyframes catMove{

0%,100%{

transform:translateY(0);

}


50%{

transform:translateY(-15px);

}

}





/* HATI */

.heart{

position:absolute;

font-size:25px;

animation:fall 6s linear infinite;

opacity:.8;

}



@keyframes fall{

from{

transform:translateY(-100px);

}


to{

transform:translateY(110vh);

}

}





/* POPUP */

.popup{

position:relative;

z-index:10;

background:white;

width:90%;

max-width:400px;

padding:35px;

border-radius:35px;

text-align:center;

box-shadow:0 20px 40px rgba(0,0,0,.15);

animation:popup .8s ease;

}



@keyframes popup{

from{

transform:scale(.5);

opacity:0;

}


to{

transform:scale(1);

opacity:1;

}

}



h1{

font-family:'Pacifico',cursive;

color:#4b9cff;

font-size:38px;

}



p{

font-family:'Pacifico',cursive;

font-size:22px;

color:#52657a
<div class="popup" id="popup">

<h1>
Sayangg 🩵
</h1>


<p>
Buka ini yaa...🥺🩵
<br>
Aku punya sesuatu buat kamu
</p>


<button onclick="openMessage()">

💌 Buka Pesan

</button>


</div>



<audio id="bgm" loop>

<source src="music.mp3" type="audio/mpeg">

</audio>




<script>


// Bintang

for(let i=0;i<70;i++){

let star=document.createElement("div");

star.className="star";

star.style.width=(2+Math.random()*4)+"px";

star.style.height=star.style.width;

star.style.left=Math.random()*100+"vw";

star.style.top=Math.random()*100+"vh";

star.style.animationDelay=Math.random()*3+"s";

document.querySelector(".sky").appendChild(star);

}



// Hati jatuh

for(let i=0;i<25;i++){

let heart=document.createElement("div");

heart.className="heart";

heart.innerHTML="🩵";

heart.style.left=Math.random()*100+"vw";

heart.style.animationDuration=(4+Math.random()*5
function ending(){


document.getElementById("popup").innerHTML=`

<h1>
I Love You 🩵
</h1>


<p>

Terima kasih yaa sayangg...🥹🩵

<br><br>

Semoga kamu selalu bahagia.

<br><br>

Aku bakal selalu sayang sama kamu 🤍

<br><br>

- Iyann 🩵

</p>


<button onclick="hug()">

🤗 Peluk Virtual

</button>


`;



}



function hug(){


let heart=document.createElement("div");


heart.innerHTML="🩵";


heart.style.position="fixed";

heart.style.left="50%";

heart.style.top="50%";

heart.style.transform="translate(-50%,-50%) scale(0)";

heart.style.fontSize="120px";

heart.style.transition="1s";

heart.style.zIndex="99";


document.body.appendChild(heart);



setTimeout(()=>{

heart.style.transform="translate(-50%,-50%) scale(1.5)";

},100);



setTimeout(()=>{

heart.remove();

alert("Peluk virtual berhasil dikirim ke Dinda 🤗🩵");

},1500);


}



</script>


</body>

</html>
